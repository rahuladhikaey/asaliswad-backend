# Render Account 1 Blueprint - Express Backend API
# Target Domain: api.asaliswad.com

services:
  - type: web
    name: asaliswad-backend-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://api.asaliswad.com
